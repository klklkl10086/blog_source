name: Hexo Auto Deploy

on:
  push:
    branches:
      - main # 确保这里是你源码仓库的主分支名

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: 'false' # 自动拉取 themes 里的主题插件

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Deploy
        env:
          # 在源码仓库 Settings -> Secrets -> Actions 里添加这个 Token
          GH_TOKEN: ${{ secrets.HEXO_DEPLOY_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 1. 过滤掉 Token 里可能带有的换行符(\n)、回车符(\r)和空格
          CLEAN_TOKEN=$(echo -n "${GH_TOKEN}" | tr -d '\n' | tr -d '\r' | tr -d ' ')
          
          # 2. 替换 _config.yml，注意使用的是清洗后的 CLEAN_TOKEN，去掉了多余的中括号
          sed -i "s|repo:.*|repo: https://${CLEAN_TOKEN}@github.com/klklkl10086/klklkl10086.github.io.git|g" _config.yml
          
          npx hexo clean
          npx hexo generate
          npx hexo deploy